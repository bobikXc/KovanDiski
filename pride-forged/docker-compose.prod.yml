services:
  postgres:
    image: postgres:16-alpine
    container_name: pride-forged-postgres-prod
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pride-prod

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pride-forged-backend-prod
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - ./telegram-outbox:/telegram-outbox
      - ./email-outbox:/email-outbox
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - pride-prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://prideforged.ru/api
        INTERNAL_API_URL: http://backend:8000/api
    container_name: pride-forged-frontend-prod
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://prideforged.ru/api
      INTERNAL_API_URL: http://backend:8000/api
    depends_on:
      - backend
    expose:
      - "3000"
    networks:
      - pride-prod

  nginx:
    image: nginx:1.27-alpine
    container_name: pride-forged-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - frontend
      - backend
    networks:
      - pride-prod

volumes:
  postgres_data:

networks:
  pride-prod:
    driver: bridge
